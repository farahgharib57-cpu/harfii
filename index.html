<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>حرفي | منصة الحرفيين</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#F59E0B;--gold-dark:#D97706;--gold-light:#FCD34D;
  --dark:#0A0A0F;--dark-2:#111118;--dark-3:#1A1A24;--dark-4:#22222F;--dark-5:#2D2D3D;
  --text:#F0F0F5;--muted:#9090A8;--success:#10B981;--danger:#EF4444;--accent:#6C63FF;
  --r:16px;--rs:10px;--t:0.3s cubic-bezier(0.4,0,0.2,1);
}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden;direction:rtl}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--dark-2)}
::-webkit-scrollbar-thumb{background:var(--dark-5);border-radius:3px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:var(--rs);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:all var(--t);border:none;text-decoration:none;outline:none}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0A0A0F;box-shadow:0 4px 20px rgba(245,158,11,0.3)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(245,158,11,0.5)}
.btn-gold:disabled{opacity:0.6;transform:none}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--dark-5)}
.btn-ghost:hover{background:var(--dark-4);color:var(--text)}

/* Cards */
.card{background:var(--dark-3);border:1px solid var(--dark-5);border-radius:var(--r);transition:all var(--t)}
.card:hover{border-color:rgba(245,158,11,0.3);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.card-static:hover{transform:none;border-color:var(--dark-5)}

/* Input */
.inp{background:var(--dark-4);border:1.5px solid var(--dark-5);border-radius:var(--rs);color:var(--text);font-family:inherit;font-size:15px;padding:12px 16px;width:100%;transition:border-color var(--t);outline:none}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--muted)}

/* Avatar */
.av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:white;flex-shrink:0}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;gap:4px}
.bg{background:rgba(245,158,11,0.15);color:var(--gold);border:1px solid rgba(245,158,11,0.3)}
.bg2{background:rgba(16,185,129,0.15);color:var(--success);border:1px solid rgba(16,185,129,0.3)}
.bg3{background:var(--dark-4);color:var(--muted)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 15px rgba(245,158,11,0.3)}50%{box-shadow:0 0 30px rgba(245,158,11,0.6)}}

.fade-up{animation:fadeUp 0.4s ease forwards;opacity:0}
.skeleton{background:linear-gradient(90deg,var(--dark-4) 25%,var(--dark-5) 50%,var(--dark-4) 75%);background-size:400px 100%;animation:shimmer 1.4s infinite;border-radius:10px}

/* Stars */
.stars{color:var(--gold);letter-spacing:-1px}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.online{background:var(--success);box-shadow:0 0 6px var(--success)}
.busy{background:var(--gold);box-shadow:0 0 6px var(--gold)}

.glow-line{height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.4}

/* Scrollbar hide */
.no-scroll::-webkit-scrollbar{display:none}
.no-scroll{scrollbar-width:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

// ── Config ──
const API_BASE = '/api';

// ── API ──
const api = {
  req: async (path, opts={}) => {
    const token = localStorage.getItem('harfi_token');
    const res = await fetch(API_BASE + path, {
      headers:{'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{})},
      ...opts
    });
    const d = await res.json();
    if(!d.success) throw new Error(d.message||'خطأ ما');
    return d;
  },
  login:(e,p)=>api.req('/auth/login',{method:'POST',body:JSON.stringify({email:e,password:p})}),
  register:(n,e,p,ph)=>api.req('/auth/register',{method:'POST',body:JSON.stringify({name:n,email:e,password:p,phone:ph})}),
  logout:()=>api.req('/auth/logout',{method:'POST'}),
  getWorkers:(params={})=>{const qs=new URLSearchParams(params).toString();return api.req(`/workers${qs?'?'+qs:''}`);},
  getWorker:(id)=>api.req(`/workers/${id}`),
  getUser:()=>api.req('/user'),
  updateUser:(d)=>api.req('/user',{method:'PUT',body:JSON.stringify(d)}),
  getBookings:()=>api.req('/bookings'),
  createBooking:(d)=>api.req('/bookings',{method:'POST',body:JSON.stringify(d)}),
  getBooking:(id)=>api.req(`/bookings/${id}`),
  getMessages:(id)=>api.req(`/bookings/${id}/messages`),
  sendMessage:(id,t)=>api.req(`/bookings/${id}/messages`,{method:'POST',body:JSON.stringify({text:t})}),
  trackBooking:(id)=>api.req(`/bookings/${id}/track`),
  search:(q)=>api.req(`/search?q=${encodeURIComponent(q)}`),
};

// ── Auth Context ──
const AuthCtx = createContext({});
function AuthProvider({children}) {
  const [user,setUser] = useState(null);
  const [loading,setLoading] = useState(true);
  useEffect(()=>{
    const t = localStorage.getItem('harfi_token');
    if(t) api.getUser().then(r=>setUser(r.data)).catch(()=>localStorage.removeItem('harfi_token')).finally(()=>setLoading(false));
    else setLoading(false);
  },[]);
  const login=async(e,p)=>{const r=await api.login(e,p);localStorage.setItem('harfi_token',r.token);setUser(r.user);return r;};
  const register=async(n,e,p,ph)=>{const r=await api.register(n,e,p,ph);localStorage.setItem('harfi_token',r.token);setUser(r.user);return r;};
  const logout=async()=>{await api.logout().catch(()=>{});localStorage.removeItem('harfi_token');setUser(null);};
  return <AuthCtx.Provider value={{user,setUser,login,register,logout,loading}}>{children}</AuthCtx.Provider>;
}
const useAuth=()=>useContext(AuthCtx);

// ── Router (simple hash-based) ──
function useRoute() {
  const [route,setRoute] = useState(()=>window.location.hash.slice(1)||'/');
  useEffect(()=>{
    const h=()=>setRoute(window.location.hash.slice(1)||'/');
    window.addEventListener('hashchange',h);
    return ()=>window.removeEventListener('hashchange',h);
  },[]);
  return route;
}
const navigate=(path)=>{window.location.hash='#'+path;};

// ── Helpers ──
const stars=(r)=>'★'.repeat(Math.floor(r))+'☆'.repeat(5-Math.floor(r));

// ════════════════════════════════════
// NAVBAR
// ════════════════════════════════════
function Navbar({route}) {
  const {user,logout} = useAuth();
  const [menu,setMenu] = useState(false);
  const isChat = route.startsWith('/chat/');
  if(isChat) return null;

  const nav=[{p:'/',l:'الرئيسية',i:'🏠'},{p:'/bookings',l:'حجوزاتي',i:'📋'},{p:'/profile',l:'حسابي',i:'👤'}];

  const handleLogout=async()=>{await logout();navigate('/auth');setMenu(false);};

  return (<>
    <nav style={{position:'fixed',top:0,left:0,right:0,zIndex:100,background:'rgba(10,10,15,0.9)',backdropFilter:'blur(20px)',borderBottom:'1px solid rgba(245,158,11,0.15)',padding:'0 20px',display:'flex',alignItems:'center',justifyContent:'space-between',height:62}}>
      <div onClick={()=>navigate('/')} style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
        <div style={{width:36,height:36,background:'linear-gradient(135deg,#F59E0B,#D97706)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:900,color:'#0A0A0F',boxShadow:'0 4px 15px rgba(245,158,11,0.4)'}}>ح</div>
        <span style={{fontSize:22,fontWeight:900,color:'#F59E0B'}}>حرفي</span>
      </div>
      <div style={{display:'flex',gap:4}}>
        {nav.map(n=>(
          <div key={n.p} onClick={()=>navigate(n.p)} style={{padding:'7px 14px',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:600,color:route===n.p?'#F59E0B':'#9090A8',background:route===n.p?'rgba(245,158,11,0.1)':'transparent',transition:'all 0.2s',display:'flex',alignItems:'center',gap:6}}>
            <span>{n.i}</span><span>{n.l}</span>
          </div>
        ))}
      </div>
      {user?(
        <div style={{display:'flex',alignItems:'center',gap:10,position:'relative'}}>
          <div style={{textAlign:'right',display:'none'}}>
            <div style={{fontSize:13,fontWeight:700}}>{user.name.split(' ')[0]}</div>
          </div>
          <div onClick={()=>setMenu(!menu)} style={{width:38,height:38,borderRadius:'50%',background:user.color||'#2979FF',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:16,cursor:'pointer',border:'2px solid rgba(245,158,11,0.4)'}}>
            {user.avatar}
          </div>
          {menu&&(
            <div style={{position:'absolute',top:48,left:0,background:'#1A1A24',border:'1px solid #2D2D3D',borderRadius:12,padding:8,minWidth:160,boxShadow:'0 20px 60px rgba(0,0,0,0.6)',zIndex:200}}>
              <div onClick={()=>{navigate('/profile');setMenu(false);}} style={{padding:'10px 16px',borderRadius:8,cursor:'pointer',fontSize:14,fontWeight:600,color:'#F0F0F5',':hover':{background:'#22222F'}}}>👤 الملف الشخصي</div>
              <button onClick={handleLogout} style={{display:'block',width:'100%',padding:'10px 16px',borderRadius:8,background:'none',border:'none',color:'#EF4444',fontSize:14,fontWeight:600,cursor:'pointer',textAlign:'right',fontFamily:'inherit'}}>🚪 تسجيل الخروج</button>
            </div>
          )}
        </div>
      ):(
        <button className="btn btn-gold" style={{padding:'8px 18px',fontSize:13}} onClick={()=>navigate('/auth')}>دخول</button>
      )}
    </nav>
    {/* Mobile bottom nav */}
    <div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:100,background:'rgba(17,17,24,0.97)',backdropFilter:'blur(20px)',borderTop:'1px solid rgba(245,158,11,0.15)',display:'flex',justifyContent:'space-around',alignItems:'center',height:62}}>
      {nav.map(n=>(
        <div key={n.p} onClick={()=>navigate(n.p)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'8px 20px',borderRadius:12,cursor:'pointer',color:route===n.p?'#F59E0B':'#9090A8',transition:'all 0.2s'}}>
          <span style={{fontSize:22}}>{n.i}</span>
          <span style={{fontSize:11,fontWeight:600}}>{n.l}</span>
        </div>
      ))}
    </div>
  </>);
}

// ════════════════════════════════════
// HOME
// ════════════════════════════════════
const CATS=[{id:null,l:'الكل',i:'🔧'},{id:'Plumbing',l:'سباكة',i:'🚿'},{id:'Electrical',l:'كهرباء',i:'⚡'},{id:'Mechanic',l:'ميكانيكي',i:'🔩'},{id:'AC',l:'تكييف',i:'❄️'},{id:'Painting',l:'دهانات',i:'🎨'},{id:'Carpentry',l:'نجارة',i:'🪵'},{id:'Construction',l:'بناء',i:'🏗️'}];
const SORTS=[{id:'rating',l:'⭐ التقييم'},{id:'distance',l:'📍 الأقرب'},{id:'price',l:'💰 السعر'}];

function WorkerCard({w,delay=0}) {
  return (
    <div className="card fade-up" style={{padding:20,cursor:'pointer',animationDelay:`${delay}ms`}} onClick={()=>navigate(`/worker/${w.id}`)}>
      <div style={{display:'flex',gap:14,alignItems:'flex-start'}}>
        <div style={{position:'relative',flexShrink:0}}>
          <div className="av" style={{background:w.color,width:58,height:58,fontSize:22,boxShadow:`0 4px 15px ${w.color}40`}}>{w.avatar}</div>
          <span className={`status-dot ${w.status}`} style={{position:'absolute',bottom:2,right:2,border:'2px solid #1A1A24'}}/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div>
              <div style={{fontWeight:700,fontSize:16}}>{w.nameAr}</div>
              <div style={{color:'#9090A8',fontSize:13}}>{w.profAr}</div>
            </div>
            <div style={{textAlign:'left',flexShrink:0}}>
              <div style={{color:'#F59E0B',fontWeight:800,fontSize:17}}>{w.price}<span style={{fontSize:11,fontWeight:400}}> ج/س</span></div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8}}>
            <span className="stars" style={{fontSize:12}}>{stars(w.rating)}</span>
            <span style={{fontSize:13,fontWeight:700}}>{w.rating}</span>
            <span style={{fontSize:12,color:'#9090A8'}}>({w.reviews})</span>
            <span style={{fontSize:12,color:'#9090A8',marginRight:'auto'}}>📍 {w.dist} كم</span>
          </div>
          <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
            <span className="badge bg">{w.categoryAr}</span>
            <span className="badge bg3">⚡ {w.exp} سنوات</span>
            <span className="badge bg3">✅ {w.jobs}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function Home() {
  const {user}=useAuth();
  const [workers,setWorkers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [cat,setCat]=useState(null);
  const [sort,setSort]=useState('rating');
  const [q,setQ]=useState('');
  const [filtered,setFiltered]=useState([]);

  const load=useCallback(async()=>{
    setLoading(true);
    try{const p={sort};if(cat)p.category=cat;const r=await api.getWorkers(p);setWorkers(r.data||[]);}
    catch{setWorkers([]);}
    finally{setLoading(false);}
  },[cat,sort]);

  useEffect(()=>{load();},[load]);
  useEffect(()=>{
    if(!q.trim()){setFiltered(workers);return;}
    const lq=q.toLowerCase();
    setFiltered(workers.filter(w=>w.nameAr.includes(q)||w.profAr.includes(q)||w.name.toLowerCase().includes(lq)||w.profession.toLowerCase().includes(lq)||w.categoryAr.includes(q)));
  },[workers,q]);

  return (
    <div style={{paddingBottom:80}}>
      {/* Hero */}
      <div style={{position:'relative',overflow:'hidden',background:'linear-gradient(135deg,#111118 0%,#1A1A24 50%,#111118 100%)',padding:'80px 20px 44px',borderBottom:'1px solid rgba(245,158,11,0.15)'}}>
        <div style={{position:'absolute',top:-80,right:-80,width:350,height:350,background:'radial-gradient(circle,rgba(245,158,11,0.1) 0%,transparent 70%)',borderRadius:'50%',pointerEvents:'none'}}/>
        <div style={{position:'absolute',bottom:-50,left:-50,width:250,height:250,background:'radial-gradient(circle,rgba(108,99,255,0.08) 0%,transparent 70%)',borderRadius:'50%',pointerEvents:'none'}}/>
        <div style={{position:'relative',maxWidth:700,margin:'0 auto'}}>
          <div style={{marginBottom:10}}>
            <span style={{fontSize:12,fontWeight:700,color:'#F59E0B',background:'rgba(245,158,11,0.1)',padding:'4px 14px',borderRadius:20,border:'1px solid rgba(245,158,11,0.3)'}}>🔨 منصة الحرفيين الموثوقة</span>
          </div>
          <h1 style={{fontSize:'clamp(26px,5vw,46px)',fontWeight:900,lineHeight:1.2,marginBottom:10,background:'linear-gradient(135deg,#F0F0F5,#F59E0B)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
            {user?`أهلاً، ${user.name.split(' ')[0]} 👋`:'اعثر على أفضل الحرفيين'}
          </h1>
          <p style={{color:'#9090A8',fontSize:15,marginBottom:24}}>سباكة • كهرباء • ميكانيكي • تكييف • دهانات وأكثر</p>
          <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>
            {[{v:'42+',l:'حرفي متاح'},{v:'4.7★',l:'متوسط التقييم'},{v:'1200+',l:'طلب مكتمل'}].map(s=>(
              <div key={s.l} style={{textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:900,color:'#F59E0B'}}>{s.v}</div>
                <div style={{fontSize:12,color:'#9090A8'}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:800,margin:'0 auto',padding:'24px 14px'}}>
        {/* Search */}
        <div style={{position:'relative',marginBottom:18}}>
          <span style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',fontSize:18,pointerEvents:'none'}}>🔍</span>
          <input className="inp" placeholder="ابحث عن حرفي، مهنة، خدمة..." value={q} onChange={e=>setQ(e.target.value)} style={{paddingRight:44,height:50,fontSize:15}}/>
        </div>

        {/* Categories */}
        <div className="no-scroll" style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4,marginBottom:18}}>
          {CATS.map(c=>(
            <button key={c.l} onClick={()=>{setCat(c.id);setQ('');}} style={{flexShrink:0,padding:'8px 16px',borderRadius:10,border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:6,background:cat===c.id?'linear-gradient(135deg,#F59E0B,#D97706)':'#1A1A24',color:cat===c.id?'#0A0A0F':'#9090A8',transition:'all 0.2s',border:cat===c.id?'none':'1px solid #2D2D3D',boxShadow:cat===c.id?'0 4px 15px rgba(245,158,11,0.3)':'none'}}>
              <span>{c.i}</span><span>{c.l}</span>
            </button>
          ))}
        </div>

        {/* Sort + count */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <span style={{color:'#9090A8',fontSize:14}}>{loading?'...':`${filtered.length} حرفي`}</span>
          <div style={{display:'flex',gap:6}}>
            {SORTS.map(s=>(
              <button key={s.id} onClick={()=>setSort(s.id)} style={{padding:'6px 12px',borderRadius:8,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:600,background:sort===s.id?'rgba(245,158,11,0.15)':'transparent',color:sort===s.id?'#F59E0B':'#9090A8',border:sort===s.id?'1px solid rgba(245,158,11,0.4)':'1px solid #2D2D3D',transition:'all 0.2s'}}>
                {s.l}
              </button>
            ))}
          </div>
        </div>

        {loading?(
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {[...Array(4)].map((_,i)=><div key={i} className="skeleton" style={{height:120}}/>)}
          </div>
        ):filtered.length===0?(
          <div style={{textAlign:'center',padding:'60px 20px'}}>
            <div style={{fontSize:50,marginBottom:12}}>🔧</div>
            <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>لا يوجد حرفيون</div>
            <div style={{color:'#9090A8'}}>جرب فئة أخرى أو غير مصطلح البحث</div>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {filtered.map((w,i)=><WorkerCard key={w.id} w={w} delay={i*50}/>)}
          </div>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════
// AUTH
// ════════════════════════════════════
function Auth() {
  const [mode,setMode]=useState('login');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [f,setF]=useState({name:'',email:'',password:'',phone:''});
  const {login,register}=useAuth();
  const set=(k,v)=>setF(p=>({...p,[k]:v}));

  const submit=async()=>{
    setErr('');setLoading(true);
    try{
      if(mode==='login') await login(f.email,f.password);
      else await register(f.name,f.email,f.password,f.phone);
      navigate('/');
    }catch(e){setErr(e.message);}
    finally{setLoading(false);}
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'80px 16px 40px',background:'radial-gradient(ellipse at 50% 0%,rgba(245,158,11,0.07) 0%,transparent 60%)'}}>
      <div style={{width:'100%',maxWidth:420}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{width:68,height:68,background:'linear-gradient(135deg,#F59E0B,#D97706)',borderRadius:20,display:'flex',alignItems:'center',justifyContent:'center',fontSize:30,fontWeight:900,color:'#0A0A0F',margin:'0 auto 14px',boxShadow:'0 8px 30px rgba(245,158,11,0.4)',animation:'glow 2s ease-in-out infinite'}}>ح</div>
          <h1 style={{fontSize:28,fontWeight:900,color:'#F59E0B'}}>حرفي</h1>
          <p style={{color:'#9090A8',fontSize:14,marginTop:4}}>منصة الحرفيين الموثوقة</p>

// CHAT
// ════════════════════════════════════
function Chat({id}) {
  const {user}=useAuth();
  const [booking,setBooking]=useState(null);
  const [msgs,setMsgs]=useState([]);
  const [text,setText]=useState('');
  const [sending,setSending]=useState(false);
  const [loading,setLoading]=useState(true);
  const bottom=useRef(null);

  useEffect(()=>{
    if(!user){navigate('/auth');return;}
    Promise.all([api.getBooking(id),api.getMessages(id)])
      .then(([br,mr])=>{setBooking(br.data);setMsgs(mr.data||[]);})
      .catch(()=>navigate('/bookings'))
      .finally(()=>setLoading(false));
  },[id,user]);

  useEffect(()=>{bottom.current?.scrollIntoView({behavior:'smooth'});},[msgs]);

  useEffect(()=>{
    const iv=setInterval(async()=>{try{const r=await api.getMessages(id);setMsgs(r.data||[]);}catch{}},3000);
    return ()=>clearInterval(iv);
  },[id]);

  const send=async()=>{
    if(!text.trim()||sending)return;
    const t=text.trim();setText('');setSending(true);
    try{
      const r=await api.sendMessage(id,t);
      setMsgs(p=>[...p,r.data]);
      setTimeout(async()=>{try{const r2=await api.getMessages(id);setMsgs(r2.data||[]);}catch{}},2600);
    }catch{}finally{setSending(false);}
  };

  if(loading) return <div style={{padding:'100px 16px',textAlign:'center',color:'#9090A8',fontSize:24,animation:'pulse 1.5s infinite'}}>⏳</div>;

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      <div style={{background:'#111118',borderBottom:'1px solid rgba(245,158,11,0.15)',padding:'12px 16px',display:'flex',alignItems:'center',gap:12,flexShrink:0,paddingTop:'env(safe-area-inset-top,12px)'}}>
        <button onClick={()=>navigate('/bookings')} style={{background:'none',border:'none',color:'#9090A8',cursor:'pointer',fontSize:18,fontFamily:'inherit',padding:'4px 8px'}}>←</button>
        {booking&&<>
          <div className="av" style={{background:booking.color,width:40,height:40,fontSize:16}}>{booking.avatar}</div>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>{booking.workerNameAr}</div>
            <div style={{fontSize:11,color:'#9090A8'}}>{booking.professionAr}</div>
          </div>
          <div style={{marginRight:'auto'}}>
            <span style={{fontSize:12,color:'#F59E0B',background:'rgba(245,158,11,0.1)',padding:'3px 10px',borderRadius:20}}>#{booking.id}</span>
          </div>
        </>}
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'14px',display:'flex',flexDirection:'column',gap:10,background:'#0A0A0F'}}>
        {msgs.map((m,i)=>{
          const isU=m.from==='user';const isSys=m.from==='system';
          if(isSys) return <div key={i} style={{textAlign:'center'}}><span style={{fontSize:12,color:'#9090A8',background:'#1A1A24',padding:'6px 14px',borderRadius:20,display:'inline-block'}}>{m.text}</span></div>;
          return (
            <div key={i} style={{display:'flex',justifyContent:isU?'flex-start':'flex-end'}}>
              <div style={{maxWidth:'76%',padding:'10px 14px',borderRadius:isU?'4px 16px 16px 16px':'16px 4px 16px 16px',background:isU?'#1A1A24':'linear-gradient(135deg,#F59E0B,#D97706)',color:isU?'#F0F0F5':'#0A0A0F',fontSize:14,lineHeight:1.5,border:isU?'1px solid #2D2D3D':'none',boxShadow:isU?'none':'0 4px 15px rgba(245,158,11,0.25)'}}>
                {m.text}
                <div style={{fontSize:10,marginTop:4,opacity:0.55,textAlign:'left'}}>{new Date(m.time).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</div>
              </div>
            </div>
          );
        })}
        <div ref={bottom}/>
      </div>

      <div style={{background:'#111118',borderTop:'1px solid rgba(245,158,11,0.15)',padding:'12px 14px',display:'flex',gap:10,alignItems:'flex-end',flexShrink:0}}>
        <textarea className="inp" rows={1} placeholder="اكتب رسالة..." value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} style={{resize:'none',flex:1,maxHeight:120,overflowY:'auto',paddingTop:12}}/>
        <button onClick={send} disabled={!text.trim()||sending} style={{width:46,height:46,borderRadius:12,border:'none',cursor:'pointer',background:text.trim()?'linear-gradient(135deg,#F59E0B,#D97706)':'#1A1A24',fontSize:18,transition:'all 0.2s',flexShrink:0,boxShadow:text.trim()?'0 4px 15px rgba(245,158,11,0.3)':'none'}}>📤</button>
      </div>
    </div>
  );
}

function Track({id}) {
  const {user}=useAuth();
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    if(!user){navigate('/auth');return;}
    api.trackBooking(id).then(r=>setData(r.data)).catch(()=>navigate('/bookings')).finally(()=>setLoading(false));
  },[id,user]);

  if(loading) return <div style={{padding:'100px 16px',textAlign:'center',color:'#9090A8',fontSize:24,animation:'pulse 1.5s infinite'}}>⏳</div>;
  if(!data) return null;

  const {booking:b,steps}=data;
  const doneCount=steps.filter(s=>s.done).length;

  return (
    <div className="fade-up" style={{paddingTop:70,paddingBottom:100}}>
      <div style={{background:'linear-gradient(135deg,#111118,#1A1A24)',borderBottom:'1px solid rgba(245,158,11,0.15)',padding:'28px 16px'}}>
        <div style={{maxWidth:700,margin:'0 auto'}}>
          <button onClick={()=>navigate('/bookings')} style={{background:'none',border:'none',color:'#9090A8',cursor:'pointer',fontSize:14,marginBottom:16,fontFamily:'inherit',display:'flex',alignItems:'center',gap:6}}>← رجوع</button>
          <h1 style={{fontSize:22,fontWeight:900}}>📍 تتبع الحجز #{b.id}</h1>
          <p style={{color:'#9090A8',fontSize:14,marginTop:4}}>{b.workerNameAr} — {b.professionAr}</p>
        </div>
      </div>
      <div style={{maxWidth:700,margin:'0 auto',padding:'24px 14px'}}>
        <div className="card card-static" style={{padding:24,marginBottom:20}}>
          <h2 style={{fontSize:16,fontWeight:800,marginBottom:18}}>مراحل الطلب</h2>
          {/* Progress bar */}
          <div style={{background:'#1A1A24',borderRadius:10,height:8,marginBottom:24,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${(doneCount/steps.length)*100}%`,background:'linear-gradient(90deg,#F59E0B,#D97706)',borderRadius:10,transition:'width 1s ease'}}/>
          </div>
          <div style={{position:'relative'}}>
            <div style={{position:'absolute',right:19,top:20,width:2,height:`calc(100% - 40px)`,background:'#2D2D3D'}}/>
            <div style={{position:'absolute',right:19,top:20,width:2,height:`${(doneCount/steps.length)*100}%`,background:'linear-gradient(180deg,#F59E0B,#D97706)',transition:'height 1s ease'}}/>
            {steps.map((step,i)=>(
              <div key={step.key} style={{display:'flex',gap:16,alignItems:'flex-start',paddingBottom:i<steps.length-1?24:0,position:'relative',zIndex:1}}>
                <div style={{width:40,height:40,borderRadius:'50%',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:step.done?'linear-gradient(135deg,#F59E0B,#D97706)':'#1A1A24',border:step.done?'2px solid #F59E0B':'2px solid #2D2D3D',fontSize:16,transition:'all 0.5s',boxShadow:step.done?'0 4px 15px rgba(245,158,11,0.3)':'none'}}>
                  {step.done?'✓':'○'}
                </div>
                <div style={{paddingTop:8}}>
                  <div style={{fontWeight:700,fontSize:14,color:step.done?'#F0F0F5':'#9090A8'}}>{step.label}</div>
                  {step.done&&<div style={{fontSize:12,color:'#F59E0B',marginTop:2}}>✅ تم</div>}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Map placeholder with animation */}
        <div className="card card-static" style={{height:180,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:10,background:'linear-gradient(135deg,#111118,#1A1A24)',marginBottom:20,overflow:'hidden',position:'relative'}}>
          <div style={{position:'absolute',width:200,height:200,background:'radial-gradient(circle,rgba(245,158,11,0.08),transparent)',borderRadius:'50%',animation:'pulse 2s infinite'}}/>
          <div style={{fontSize:44,animation:'pulse 2s infinite'}}>🗺️</div>
          <div style={{color:'#9090A8',fontSize:13}}>خريطة تتبع الحرفي في الوقت الفعلي</div>
        </div>

        <div className="card card-static" style={{padding:20,marginBottom:20}}>
          <h2 style={{fontSize:15,fontWeight:800,marginBottom:14}}>تفاصيل الحجز</h2>
          {[['رقم الحجز',`#${b.id}`],['الحرفي',b.workerNameAr],['الخدمة',b.professionAr],['الإجمالي',`${b.amount} ج`],['الدفع',b.payment],['الموقع',b.location]].map(([l,v])=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
              <span style={{color:'#9090A8',fontSize:14}}>{l}</span>
              <span style={{fontWeight:700,fontSize:14}}>{v}</span>
            </div>
          ))}
        </div>

        <button className="btn btn-gold" style={{width:'100%',height:50,fontSize:15}} onClick={()=>navigate(`/chat/${b.id}`)}>💬 التواصل مع الحرفي</button>
      </div>
    </div>
  );
}

// ════════════════════════════════════
// PROFILE
// ════════════════════════════════════
function Profile() {
  const {user,setUser,logout}=useAuth();
  const [editing,setEditing]=useState(false);
  const [name,setName]=useState(user?.name||'');
  const [phone,setPhone]=useState(user?.phone||'');
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState('');

  if(!user){navigate('/auth');return null;}

  const save=async()=>{
    setSaving(true);setMsg('');
    try{const r=await api.updateUser({name,phone});setUser(r.data);setMsg('✅ تم الحفظ');setEditing(false);}
    catch(e){setMsg('⚠️ '+e.message);}
    finally{setSaving(false);}
  };

  const handleLogout=async()=>{await logout();navigate('/auth');};

  return (
    <div className="fade-up" style={{paddingTop:70,paddingBottom:100}}>
      <div style={{background:'linear-gradient(135deg,#111118,#1A1A24)',borderBottom:'1px solid rgba(245,158,11,0.15)',padding:'36px 16px',textAlign:'center'}}>
        <div style={{width:78,height:78,borderRadius:'50%',background:user.color||'#2979FF',display:'flex',alignItems:'center',justifyContent:'center',fontSize:30,fontWeight:900,color:'white',margin:'0 auto 14px',border:'3px solid rgba(245,158,11,0.4)',boxShadow:'0 8px 30px rgba(245,158,11,0.2)',animation:'glow 3s ease-in-out infinite'}}>
          {user.avatar}
        </div>
        <h1 style={{fontSize:24,fontWeight:900,marginBottom:4}}>{user.name}</h1>
        <p style={{color:'#9090A8',fontSize:13,marginBottom:12}}>{user.email}</p>
        <span className="badge bg">📍 {user.location}</span>
      </div>

      <div style={{maxWidth:600,margin:'0 auto',padding:'24px 14px'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:24}}>
          {[{v:user.bookings,l:'حجوزات',i:'📋'},{v:user.completed,l:'مكتملة',i:'✅'},{v:user.rating,l:'تقييمي',i:'⭐'}].map(s=>(
            <div key={s.l} className="card card-static" style={{padding:'16px 8px',textAlign:'center'}}>
              <div style={{fontSize:20,marginBottom:4}}>{s.i}</div>
              <div style={{fontSize:20,fontWeight:900,color:'#F59E0B'}}>{s.v}</div>
              <div style={{fontSize:12,color:'#9090A8'}}>{s.l}</div>
            </div>
          ))}
        </div>

        <div className="card card-static" style={{padding:22,marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
            <h2 style={{fontSize:16,fontWeight:800}}>المعلومات الشخصية</h2>
            <button onClick={()=>editing?save():setEditing(true)} className={editing?'btn btn-gold':'btn btn-ghost'} style={{padding:'8px 16px',fontSize:13}} disabled={saving}>
              {saving?'⏳':editing?'💾 حفظ':'✏️ تعديل'}
            </button>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {[[' الاسم',name,setName,'text'],[' رقم الهاتف',phone,setPhone,'tel']].map(([l,v,fn,t])=>(
              <div key={l}>
                <label style={{fontSize:13,color:'#9090A8',marginBottom:6,display:'block'}}>{l}</label>
                {editing?<input className="inp" type={t} value={v} onChange={e=>fn(e.target.value)}/>:<div style={{padding:'12px 16px',background:'#111118',borderRadius:10,fontSize:15}}>{v||'—'}</div>}
              </div>
            ))}
            <div>
              <label style={{fontSize:13,color:'#9090A8',marginBottom:6,display:'block'}}> البريد الإلكتروني</label>
              <div style={{padding:'12px 16px',background:'#111118',borderRadius:10,fontSize:15,color:'#9090A8'}}>{user.email}</div>
            </div>
          </div>
          {msg&&<div style={{marginTop:12,padding:'10px 14px',borderRadius:10,background:msg.startsWith('✅')?'rgba(16,185,129,0.1)':'rgba(239,68,68,0.1)',border:`1px solid ${msg.startsWith('✅')?'rgba(16,185,129,0.3)':'rgba(239,68,68,0.3)'}`,color:msg.startsWith('✅')?'#10B981':'#EF4444',fontSize:13,fontWeight:600}}>{msg}</div>}
        </div>

        <div className="card card-static" style={{padding:'0 20px',marginBottom:14}}>
          {[{i:'📋',l:'حجوزاتي',a:()=>navigate('/bookings')},{i:'🔔',l:'الإشعارات',a:()=>{}},{i:'🔒',l:'الأمان',a:()=>{}},{i:'❓',l:'المساعدة',a:()=>{}}].map((item,idx,arr)=>(
            <button key={item.l} onClick={item.a} style={{width:'100%',display:'flex',alignItems:'center',gap:14,padding:'15px 0',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',color:'#F0F0F5',fontSize:15,fontWeight:600,borderBottom:idx<arr.length-1?'1px solid #2D2D3D':'none',textAlign:'right'}}>
              <span style={{fontSize:20}}>{item.i}</span>
              <span style={{flex:1}}>{item.l}</span>
              <span style={{color:'#9090A8',fontSize:20}}>›</span>
            </button>
          ))}
        </div>

        <button onClick={handleLogout} className="btn" style={{width:'100%',height:50,background:'rgba(239,68,68,0.1)',color:'#EF4444',border:'1.5px solid rgba(239,68,68,0.3)',fontSize:15}}>
          🚪 تسجيل الخروج
        </button>
      </div>
    </div>
  );
}

// ════════════════════════════════════
// ROUTER
// ════════════════════════════════════
function Router() {
  const route=useRoute();
  const {user,loading}=useAuth();

  if(loading) return (
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <div style={{fontSize:48,animation:'spin 1s linear infinite'}}>🔨</div>
      <div style={{color:'#9090A8',fontSize:15,fontWeight:600}}>جاري التحميل...</div>
    </div>
  );

  // Parse route
  const isChat=route.startsWith('/chat/');
  const isWorker=route.startsWith('/worker/');
  const isTrack=route.startsWith('/track/');

  const renderPage=()=>{
    if(route==='/') return <Home/>;
    if(route==='/auth') return <Auth/>;
    if(isWorker) return <WorkerDetail id={route.split('/worker/')[1]}/>;
    if(route==='/bookings') return user?<Bookings/>:<Auth/>;
    if(isChat) return user?<Chat id={route.split('/chat/')[1]}/>:<Auth/>;
    if(isTrack) return user?<Track id={route.split('/track/')[1]}/>:<Auth/>;
    if(route==='/profile') return user?<Profile/>:<Auth/>;
    return <Home/>;
  };

  return (
    <>
      <Navbar route={route}/>
      <div style={{paddingTop:isChat?0:0}}>
        {renderPage()}
      </div>
    </>
  );
}

function App() {
  return (
    <AuthProvider>
      <Router/>
    </AuthProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
